<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <title>Computer Architecture 3D</title>
  </head>
  <body>
    <div id="dashboard">
      <div class="stat"><span class="label">CPU TEMP:</span> <span id="cpu-temp">42</span>°C</div>
      <div class="stat"><span class="label">RAM UTIL:</span> <span id="ram-util">14.2</span> GB</div>
      <div class="stat"><span class="label">BUS SPEED:</span> <span id="bus-speed">5000</span> MT/s</div>
      <div class="stat control">
        <span class="label">SIM SPEED:</span>
        <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
      </div>
    </div>
    <div id="activity-log">
      <div class="log-header">SYSTEM ACTIVITY LOG</div>
      <div id="log-container"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
